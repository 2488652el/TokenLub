services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tokenlub}
      POSTGRES_USER: ${POSTGRES_USER:-tokenlub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tokenlub}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tokenlub}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:?set ACCESS_TOKEN_SECRET}
      PORT: 3000
      ACCESS_TOKEN_TTL_MS: ${ACCESS_TOKEN_TTL_MS:-900000}
      SYNC_RATE_LIMIT_PER_MINUTE: ${SYNC_RATE_LIMIT_PER_MINUTE:-120}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '127.0.0.1:3000:3000'

volumes:
  postgres-data:
