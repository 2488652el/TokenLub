services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tokenlub}
      POSTGRES_USER: ${POSTGRES_USER:-tokenlub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: ..
      dockerfile: drive/Dockerfile
    restart: unless-stopped
    env_file:
      - ${TOKENLUB_INSTALL_DIR:?set TOKENLUB_INSTALL_DIR}/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tokenlub}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tokenlub}
      PORT: 3000
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/healthz').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  postgres-data:
