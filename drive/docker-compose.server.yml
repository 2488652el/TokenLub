services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tokenlub}
      POSTGRES_USER: ${POSTGRES_USER:-tokenlub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: ..
      dockerfile: drive/Dockerfile
    restart: unless-stopped
    env_file:
      - ${TOKENLUB_INSTALL_DIR:?set TOKENLUB_INSTALL_DIR}/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tokenlub}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tokenlub}
      PORT: 3000
    expose:
      - '3000'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/healthz').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    environment:
      TOKENLUB_DOMAIN: ${TOKENLUB_DOMAIN:?set TOKENLUB_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ${TOKENLUB_INSTALL_DIR:?set TOKENLUB_INSTALL_DIR}/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'caddy', 'validate', '--config', '/etc/caddy/Caddyfile']
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
